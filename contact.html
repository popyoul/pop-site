<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Popyoul's Websites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Banner / Header */
        .banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 80px;
            border-bottom: 2px solid #333;
            position: relative;
        }

        .logo-container {
            position: absolute;
            top: 130px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            background: #222;
            z-index: 10;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-title {
            margin-top: -50px;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background: #111;
            border-bottom: 1px solid #333;
            padding: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        nav a:hover {
            background: #333;
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
            color: #fff;
        }

        /* Contact Section */
        .contact-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 30px;
        }

        .contact-card p {
            color: #ccc;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .contact-card a {
            color: #4183c4;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .contact-card a:hover {
            text-decoration: underline;
        }

        .contact-item {
            margin-bottom: 25px;
        }

        .contact-item strong {
            display: block;
            color: #fff;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Banner with Logo -->
    <div class="banner">
        <div class="logo-container">
            <img id="logo-img" src="" alt="Logo">
        </div>
        <div class="banner-title">Popyoul's Websites</div>
    </div>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="examples.html">Examples</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h2 class="page-title">Get In Touch</h2>
        
        <div class="contact-card">
            <p>Want a website? Have questions? Drop me a message!</p>
            
            <div class="contact-item">
                <strong>Email</strong>
                <a href="mailto:popyoulwebsite@gmail.com">popyoulwebsite@gmail.com</a>
            </div>
            
            <div class="contact-item">
                <strong>Social</strong>
                <a href="#">Your Social Link</a>
            </div>
            
            <div class="contact-item">
                <strong>Location</strong>
                <span style="color: #999;">Staten Island, New York</span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Popyoul. All rights reserved.</p>
    </footer>

    <script>
        const logoImg = document.getElementById('logo-img');
        if (!logoImg.src || logoImg.src === window.location.href) {
            logoImg.style.display = 'none';
        }
    </script>
</body>
</html>
