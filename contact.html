<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Popyoul's Websites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0F172A;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Banner / Header */
        .banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1e293b 0%, #0F172A 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 80px;
            border-bottom: 2px solid #334155;
            position: relative;
        }

        .banner-title {
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background: #0F172A;
            border-bottom: 1px solid #334155;
            padding: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        nav .nav-subtext { display: block; font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

        nav a:hover { background: #1e293b; }

        nav .nav-subtext { display: block; font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

        nav a:hover {
            background: #333;
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #334155;
            color: #fff;
        }

        /* Contact Section */
        .contact-card {
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 30px;
        }

        .contact-card p {
            color: #F1F5F9;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .contact-card a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .contact-card a:hover {
            text-decoration: underline;
        }

        .contact-item {
            margin-bottom: 25px;
        }

        .contact-item strong {
            display: block;
            color: #fff;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        /* Contact Form */
        .contact-form {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
        }

        .contact-form h3 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 5px;
            color: #F1F5F9;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            background: #60a5fa;
            color: #0F172A;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background: #3b82f6;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #333;
            color: #F1F5F9;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Banner -->
    <div class="banner">
        <div class="banner-title">Popyoul's Websites</div>
    </div>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="https://popyoul.github.io/pop-site/">Home</a></li>
            <li><a href="https://popyoul.github.io/pop-site/examples.html">Examples</a></li>
            <li><a href="https://popyoul.github.io/pop-site/contact.html">Contact</a></li>
            <li><a href="https://popyoul.github.io/pop-site/about.html">About</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h2 class="page-title">Get In Touch</h2>
        
        <div class="contact-card">
            <p>Want a website? Have questions? Drop me a message!</p>
            
            <div class="contact-item">
                <strong>Email</strong>
                <a href="mailto:popyoulwebsite@gmail.com">popyoulwebsite@gmail.com</a>
            </div>
            
            <div class="contact-item">
                <strong>Social</strong>
                <a href="#">Your Social Link</a>
            </div>
            
            <div class="contact-item">
                <strong>Location</strong>
                <span style="color: #F1F5F9;">Staten Island, New York</span>
            </div>
        </div>
        
        <!-- Contact Form -->
        <div class="contact-form">
            <h3>Send Me a Message</h3>
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Popyoul. All rights reserved.</p>
    </footer>

    <script>
</body>
</html>
