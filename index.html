<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popyoul's Websites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0F172A;
            color: #F1F5F9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Banner / Header */
        .banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1e293b 0%, #0F172A 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 80px;
            border-bottom: 2px solid #fff;
            position: relative;
        }

        .logo-container {
            position: absolute; top: 20px; left: 20px; margin-top: 0;
            top: 130px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            background: #0F172A;
            z-index: 10;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-title {
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background: #0F172A;
            border-bottom: 1px solid #fff;
            padding: 0;
        }

        nav a:hover {
            background: #1e293b;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 0;
        }

        nav a {
            color: #F1F5F9;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        nav a:hover {
            background: #333;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* About Section */
        .section {
            margin-bottom: 60px;
        }

        .section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #fff;
            color: #F1F5F9;
        }

        .about-text {
            font-size: 2rem;
            font-weight: bold;
            color: #F1F5F9;
            line-height: 1.8;
            text-align: center;
            padding: 20px;
        }

        /* Examples Grid */
        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .example-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .example-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }

        .example-card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #F1F5F9;
        }

        .example-card p {
            color: #F1F5F9;
            line-height: 1.6;
        }

        .example-card .placeholder {
            width: 100%;
            height: 150px;
            background: #222;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            margin-bottom: 15px;
        }

        /* Contact Section */
        .contact-info {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
        }

        .contact-info p {
            color: #F1F5F9;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .contact-info a {
            color: #4183c4;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #fff;
            color: #F1F5F9;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Banner with Logo -->
    <div class="banner">
        <div class="banner-title">Popyoul's Websites</div>
    </div>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="https://popyoul.github.io/pop-site/">Home</a></li>
            <li><a href="https://popyoul.github.io/pop-site/examples.html">Examples</a></li>
            <li><a href="https://popyoul.github.io/pop-site/contact.html">Contact</a></li>
            <li><a href="https://popyoul.github.io/pop-site/about.html">About</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- About Section -->
        <div class="section">
            <h2>About</h2>
            <p class="about-text">
                Welcome to Popyoul's Websites — we build websites that work for you.
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Popyoul. All rights reserved.</p>
    </footer>

    <script>
        // Set default logo if none provided
        const logoImg = document.getElementById('logo-img');
        if (!logoImg.src || logoImg.src === window.location.href) {
            logoImg.style.display = 'none';
        }
    </script>
</body>
</html>
